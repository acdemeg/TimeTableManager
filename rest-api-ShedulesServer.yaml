swagger: "2.0"
info:
  description: "This is a sample server TimeTables Server."
  version: "1.0.0"
  title: "TimeTables Server"
  termsOfService: "http://swagger.io/terms/"
  contact:
    email: "apiteam@swagger.io"
  license:
    name: "Apache 2.0"
    url: "http://www.apache.org/licenses/LICENSE-2.0.html"
# host: "schedulestore.swagger.io"
# basePath: "/v2"
tags:
- name: "schedule"
  description: "Everything about your Schedule"
  externalDocs:
    description: "Find out more"
    url: "http://swagger.io"
- name: "store"
  description: "Access to timeTables"
- name: "user"
  description: "Operations about user"
  externalDocs:
    description: "Find out more about our store"
    url: "http://swagger.io"
schemes:
- "https"
- "http"
paths:
  /schedules:
    post:
      tags:
      - "schedules"
      summary: "Add a new schedule"
      description: ""
      operationId: "addSchedule"
      consumes:
      - "application/json"
      produces:
      - "application/json"
      parameters:
      - in: "body"
        name: "body"
        description: "Schedule that need to add the app"
        required: true
        schema:
          $ref: "#/definitions/Schedule"
      responses:
        500:
          description: "Invalid input"
    patch:
      tags:
      - "schedule"
      summary: "Update title the schedule"
      description: ""
      operationId: "updateScheduleTitle"
      consumes:
      - "application/json"
      produces:
      - "application/json"
      parameters:
      - in: "body"
        name: "body"
        description: "new schedule title"
        required: true
        schema:
          $ref: "#/definitions/Schedule"
      responses:
        400:
          description: "Invalid ID supplied"
        404:
          description: "schedule not found"
        500:
          description: "internal error"
    get:
      tags:
      - "schedule"
      summary: "get all an existing schedules"
      description: ""
      operationId: "getSchedules"
      consumes:
      - "application/json"
      produces:
      - "application/json"
      responses:
        404:
          description: "schedules not found"
        500:
          description: "internal error"

  /schedules/{scheduleId}:
    get:
      tags:
      - "schedule"
      summary: "Find schedule by ID"
      description: "Returns a single schedule"
      operationId: "getscheduleById"
      produces:
      - "application/json"
      parameters:
      - name: "scheduleId"
        in: "path"
        description: "ID of schedule to return"
        required: true
        type: "integer"
        format: "int64"
      responses:
        200:
          description: "successful operation"
          schema:
            $ref: "#/definitions/Schedule"
        400:
          description: "Invalid ID supplied"
        404:
          description: "schedule not found"
    delete:
      tags:
      - "schedules"
      summary: "Deletes a schedule"
      description: ""
      operationId: "deleteschedule"
      produces:
      - "application/xml"
      - "application/json"
      parameters:
      - name: "api_key"
        in: "header"
        required: false
        type: "string"
      - name: "scheduleId"
        in: "path"
        description: "schedule id to delete"
        required: true
        type: "integer"
        format: "int64"
      responses:
        400:
          description: "Invalid ID supplied"
        404:
          description: "schedule not found"

  /user:
    post:
      tags:
      - "user"
      summary: "Create user"
      description: "This can only be done by the logged in user."
      operationId: "createUser"
      produces:
      - "application/json"
      parameters:
      - in: "body"
        name: "body"
        description: "Created user object"
        required: true
        schema:
          $ref: "#/definitions/User"
      responses:
        default:
          description: "successful operation"
  /user/login:
    post:
      tags:
      - "user"
      summary: "Logs user into the system"
      operationId: "loginUser"
      consumes:
      - "application/json"
      produces:
      - "application/json"
      parameters:
      - in: "body"
        name: "body"
        description: "login and passw into body"
        required: true
        schema:
          $ref: "#/definitions/User"
      responses:
        500:
          description: "Invalid input"

  /user/reserve/{scheduleId}/{numberSlot}:
    post:
      tags:
      - "reservations"
      summary: "reserve of free slot"
      description: ""
      operationId: "reserveOfSlot"
      consumes:
      - "application/json"
      produces:
      - "application/json"
      parameters:
      - name: "numberSlot"
        in: "path"
        required: true
        type: "integer"
        format: "int64"
      - name: "scheduleId"
        in: "path"
        required: true
        type: "integer"
        format: "int64"
      responses:
        500:
          description: "internal error"

  /reservations/{scheduleId}/:
   get:
    tags:
    - "reservations"
    description: ""
    operationId: "getReservationsOfSchedule"
    produces:
    - "application/json"
    parameters:
    - name: "scheduleId"
      in: "path"
      required: true
      type: "string"
    responses:
      200:
        description: "fetched reservations"
        schema:
          $ref: "#/definitions/Reservation"
      404:
        description: "Schedule not found"

  /user/logout:
    post:
      tags:
      - "user"
      summary: "Logs out current logged in user session"
      description: ""
      operationId: "logoutUser"
      produces:
      - "application/xml"
      - "application/json"
      parameters: []
      responses:
        default:
          description: "successful operation"
  /user/{id}:
    get:
      tags:
      - "user"
      summary: "Get user by user id"
      description: ""
      operationId: "getUserById"
      produces:
      - "application/json"
      parameters:
      - name: "id"
        in: "path"
        required: true
        type: "string"
      responses:
        200:
          description: "successful operation"
          schema:
            $ref: "#/definitions/User"
        404:
          description: "User not found"
    put:
      tags:
      - "user"
      summary: "Updated user"
      description: "This can only be done by the logged in user."
      operationId: "updateUser"
      produces:
      - "application/xml"
      - "application/json"
      parameters:
      - name: "id"
        in: "path"
        description: "id that need to be updated"
        required: true
        type: "string"
      - in: "body"
        name: "body"
        description: "Updated user object"
        required: true
        schema:
          $ref: "#/definitions/User"
      responses:
        404:
          description: "User not found"
    delete:
      tags:
      - "user"
      summary: "Delete user"
      description: "This can only be done by the logged in user."
      operationId: "deleteUser"
      produces:
      - "application/json"
      parameters:
      - name: "id"
        in: "path"
        description: "The id that needs to be deleted"
        required: true
        type: "string"
      responses:
        404:
          description: "User not found"

  /users/{userId}/reservations:
   get:
    tags:
    - "users"
    description: ""
    operationId: "getReservationsOfUser"
    produces:
    - "application/json"
    parameters:
    - name: "userId"
      in: "path"
      required: true
      type: "string"
    responses:
      200:
        description: "fetched reservations"
        schema:
          $ref: "#/definitions/Reservation"
      404:
        description: "User not found"

  /users:
   get:
    tags:
    - "users"
    description: "get all users"
    operationId: "getUsers"
    produces:
    - "application/json"
    responses:
      200:
        description: "fetched users"
        schema:
          $ref: "#/definitions/User"

  /admin/reservation/{scheduleId}/{reservationId}:
    patch:
      tags:
      - "admin"
      description: "update reservation status"
      operationId: "updateReservation"
      produces:
      - "application/json"
      parameters:
      - name: "scheduleId"
        in: "path"
        required: true
        type: "integer"
        format: "int64"
      - name: "reservationId"
        in: "path"
        required: true
        type: "integer"
        format: "int64"
      responses:
        500:
          description: "internal error"
        404:
          description: "not found"
          schema:
            $ref: "#/definitions/Notice"

definitions:

  Attribute:
    type: "object"
    properties:
      id:
        type: "integer"
        format: "int64"
      title:
        type: "string"
      typeOfAttribute:
        description: "string or number or Date"
      isRequire:
        type: "boolean"

  Reservation:
    type: "object"
    properties:
      id:
        type: "integer"
        format: "int64"
      id_schedule:
        type: "integer"
        format: "int64"
      author:
        type: "string"
      period:
        type: "object"
        properties:
          dateStart:
            type: "object"
          dateEnd:
            type: "object"
      status:
        description: "confirmed or created or rejected"
      values:
        type: "object"

  Notice:
    type: "object"
    properties:
      id:
        type: "integer"
        format: "int64"
      id_reservation:
        type: "integer"
        format: "int64"
      type:
        description: "confirmed or created or rejected or resolved"
      status:
        type: "boolean"

  User:
    type: "object"
    properties:
      id:
        type: "integer"
        format: "int64"
      username:
        type: "string"
      firstName:
        type: "string"
      lastName:
        type: "string"
      email:
        type: "string"
      password:
        type: "string"
      phone:
        type: "string"
      userStatus:
        type: "integer"
        format: "int32"
        description: "User Status"
      isAdmin:
        type: "boolean"

  Schedule:
    type: "object"
    required:
    - "name"
    - "period"
    - "sizeSlot"
    properties:
      id:
        type: "integer"
        format: "int64"
      name:
        type: "string"
      period:
        type: "object"
        description: "into object timestamps Start and End"
      slots:
        type: "array"
        items:
          type: "number"

  ApiResponse:
    type: "object"
    properties:
      code:
        type: "integer"
        format: "int32"
      type:
        type: "string"
      message:
        type: "string"
externalDocs:
  description: "Find out more about Swagger"
  url: "http://swagger.io"
# Added by API Auto Mocking Plugin
host: virtserver.swaggerhub.com
basePath: /acdemeg/time_tables_server/1.0.0
